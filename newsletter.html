<html lang="en">
<head>
    <meta charset="UTF-8">

    <!--====================== ESTILOS (COPIAR EN TODAS LAS PÁGINAS DEL PROYECTO) ======================================-->

<body class="newsletter">
     <!--================================================== ENCABEZADO PRINCIPAL (SIN BARRA DE NAVEGACION)================-->
    <header>
        <nav class="nav">
            <div class="nav-container">
                <div class="nav-logo">
                    <img src="images/logo-rosa.png" alt="Logo La Cola Feliz" id="logo1">

    <main>

        <section class="suscripcion">
            <div class="newsletter-logo">
                <img src="images/gatita.jpeg" alt="logo la colita feliz">

            <form action="suscripcion.html" method="post">
                <h1>Cuida mejor de tu mascota</h1>

                <label for="email"></label>

                <label for="privacidad" class="privacidad">

                </label> 
                <button type="submit" name="enviar" value="enviar">¡Suscribete ahora!</button>
                <a class="boton" href="index.html">Volver al inicio</a>
            </form>
        </section>
